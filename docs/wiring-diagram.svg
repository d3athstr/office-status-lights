<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="920" height="560" fill="#ffffff"/>

  <!-- title -->
  <text x="460" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Office Status Light — wiring</text>
  <text x="460" y="60" text-anchor="middle" font-size="13" fill="#666666">XIAO ESP32-C6 + 24-LED WS2812B ring · single 5 V USB-C supply · one unit per office</text>

  <!-- ===== USB wall wart ===== -->
  <rect x="48" y="215" width="100" height="80" rx="10" fill="#e8e8e8" stroke="#888888" stroke-width="1.5"/>
  <line x1="30" y1="238" x2="48" y2="238" stroke="#888888" stroke-width="5"/>
  <line x1="30" y1="272" x2="48" y2="272" stroke="#888888" stroke-width="5"/>
  <text x="98" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">5 V ≥ 2 A</text>
  <text x="98" y="264" text-anchor="middle" font-size="11" fill="#555555">USB wall wart</text>

  <!-- USB cable -->
  <line x1="148" y1="255" x2="248" y2="255" stroke="#888888" stroke-width="4"/>
  <text x="198" y="243" text-anchor="middle" font-size="11" fill="#777777">USB-C</text>

  <!-- ===== XIAO ESP32-C6 ===== -->
  <rect x="248" y="170" width="172" height="170" rx="12" fill="#2b3440" stroke="#111827" stroke-width="1.5"/>
  <rect x="244" y="240" width="14" height="30" rx="3" fill="#b8bec6" stroke="#6b7280"/>
  <rect x="300" y="182" width="70" height="26" rx="4" fill="#3d4a5c"/> <!-- shield -->
  <text x="334" y="230" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">XIAO</text>
  <text x="334" y="248" text-anchor="middle" font-size="13" fill="#d7dde6">ESP32-C6</text>

  <!-- pins on right edge -->
  <rect x="418" y="205" width="12" height="10" fill="#d4af37"/>
  <rect x="418" y="245" width="12" height="10" fill="#d4af37"/>
  <rect x="418" y="295" width="12" height="10" fill="#d4af37"/>
  <text x="412" y="213" text-anchor="end" font-size="11" font-weight="bold" fill="#f0d9a0">5V</text>
  <text x="412" y="253" text-anchor="end" font-size="11" font-weight="bold" fill="#f0d9a0">GND</text>
  <text x="412" y="303" text-anchor="end" font-size="11" font-weight="bold" fill="#f0d9a0">D1</text>

  <!-- ===== wires ===== -->
  <!-- 5V (red): pin (430,210) -> elbow -> ring pad stub (618,220) -->
  <polyline points="430,210 520,210 520,220 618,220" fill="none" stroke="#d94141" stroke-width="3"/>
  <text x="472" y="200" font-size="11" font-weight="bold" fill="#d94141">5 V</text>

  <!-- GND (dark): pin (430,250) -> (618,255) -->
  <polyline points="430,250 505,250 505,255 618,255" fill="none" stroke="#3d3d3d" stroke-width="3"/>
  <text x="465" y="270" font-size="11" font-weight="bold" fill="#3d3d3d">GND</text>

  <!-- data (blue): pin (430,300) -> resistor -> elbow -> (618,290) -->
  <line x1="430" y1="300" x2="458" y2="300" stroke="#2f6fb8" stroke-width="3"/>
  <rect x="458" y="291" width="48" height="18" rx="3" fill="#ffffff" stroke="#2f6fb8" stroke-width="2"/>
  <text x="482" y="304" text-anchor="middle" font-size="11" font-weight="bold" fill="#2f6fb8">330 Ω</text>
  <polyline points="506,300 560,300 560,290 618,290" fill="none" stroke="#2f6fb8" stroke-width="3"/>
  <text x="482" y="330" text-anchor="middle" font-size="10" fill="#777777">GPIO1 · resistor close to DIN</text>

  <!-- ===== 1000uF cap across 5V/GND at the ring ===== -->
  <line x1="580" y1="220" x2="580" y2="230" stroke="#3d3d3d" stroke-width="2.5"/>
  <line x1="568" y1="230" x2="592" y2="230" stroke="#3d3d3d" stroke-width="3"/>
  <line x1="568" y1="238" x2="592" y2="238" stroke="#3d3d3d" stroke-width="3"/>
  <line x1="580" y1="238" x2="580" y2="255" stroke="#3d3d3d" stroke-width="2.5"/>
  <circle cx="580" cy="220" r="3.5" fill="#d94141"/>
  <circle cx="580" cy="255" r="3.5" fill="#3d3d3d"/>
  <text x="596" y="227" font-size="11" font-weight="bold" fill="#333333">+</text>
  <text x="560" y="278" text-anchor="middle" font-size="10" fill="#777777">1000 µF 6.3 V</text>
  <text x="560" y="290" text-anchor="middle" font-size="10" fill="#777777">at the ring</text>

  <!-- ===== WS2812B ring ===== -->
  <circle cx="750" cy="255" r="105" fill="#173a2a" stroke="#0e2419" stroke-width="2"/>
  <circle cx="750" cy="255" r="60" fill="#ffffff" stroke="#0e2419" stroke-width="2"/>
  <!-- 24 LEDs at r=83, skip 3 positions near the pads (left side) -->
  <g fill="#f5f5f0" stroke="#999999" stroke-width="0.8">
    <circle cx="833.0" cy="255.0" r="7"/>
    <circle cx="830.2" cy="276.5" r="7"/>
    <circle cx="821.9" cy="296.5" r="7"/>
    <circle cx="808.7" cy="313.7" r="7"/>
    <circle cx="791.5" cy="326.9" r="7"/>
    <circle cx="771.5" cy="335.2" r="7"/>
    <circle cx="750.0" cy="338.0" r="7"/>
    <circle cx="728.5" cy="335.2" r="7"/>
    <circle cx="708.5" cy="326.9" r="7"/>
    <circle cx="691.3" cy="313.7" r="7"/>
    <circle cx="678.1" cy="296.5" r="7"/>
    <circle cx="678.1" cy="213.5" r="7"/>
    <circle cx="691.3" cy="196.3" r="7"/>
    <circle cx="708.5" cy="183.1" r="7"/>
    <circle cx="728.5" cy="174.8" r="7"/>
    <circle cx="750.0" cy="172.0" r="7"/>
    <circle cx="771.5" cy="174.8" r="7"/>
    <circle cx="791.5" cy="183.1" r="7"/>
    <circle cx="808.7" cy="196.3" r="7"/>
    <circle cx="821.9" cy="213.5" r="7"/>
    <circle cx="830.2" cy="233.5" r="7"/>
  </g>

  <!-- ring solder-pad stubs (left edge) -->
  <rect x="618" y="214" width="28" height="12" rx="2" fill="#d4af37" stroke="#8a7020"/>
  <rect x="618" y="249" width="28" height="12" rx="2" fill="#d4af37" stroke="#8a7020"/>
  <rect x="618" y="284" width="28" height="12" rx="2" fill="#d4af37" stroke="#8a7020"/>
  <text x="652" y="224" font-size="10" font-weight="bold" fill="#ffffff">5V</text>
  <text x="652" y="259" font-size="10" font-weight="bold" fill="#ffffff">GND</text>
  <text x="652" y="294" font-size="10" font-weight="bold" fill="#ffffff">DIN</text>

  <text x="750" y="251" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">24× WS2812B</text>
  <text x="750" y="267" text-anchor="middle" font-size="11" fill="#666666">5050 ring</text>
  <text x="750" y="392" text-anchor="middle" font-size="10" fill="#777777">DOUT unused (no chaining)</text>

  <!-- ===== segment map (quadrants) ===== -->
  <text x="750" y="128" text-anchor="middle" font-size="10" fill="#999999">LEDs 0–5: WAN · 6–11: VPN · 12–17: BACKUP · 18–23: ALERT</text>

  <!-- ===== footnotes ===== -->
  <text x="60" y="440" font-size="12" font-weight="bold" fill="#333333">Notes</text>
  <text x="60" y="460" font-size="11" fill="#555555">• Single supply: wall wart → XIAO USB-C; ring fed from the XIAO 5V pin (VBUS). Keep firmware Max Brightness ≤ 35 % (~0.5 A).</text>
  <text x="60" y="478" font-size="11" fill="#555555">• Full-brightness option: feed ring 5V/GND straight from the supply and tie XIAO 5V to the same rail (grounds common).</text>
  <text x="60" y="496" font-size="11" fill="#555555">• Common ground is required. Keep the GPIO1 → DIN lead short (&lt; 10 cm).</text>
  <text x="60" y="514" font-size="11" fill="#555555">• 3.3 V data into a 5 V ring usually works; if it flickers: 74AHCT125 buffer, or (separate-feed config only) a 1N4007 drop on ring 5V.</text>
  <text x="60" y="532" font-size="11" fill="#555555">• Solder the 1000 µF cap (mind polarity: + to 5V) and 330 Ω resistor at the ring pads, so the ring presents a clean 3-wire pigtail.</text>
</svg>
