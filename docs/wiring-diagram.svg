<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 780" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="980" height="780" fill="#ffffff"/>

  <!-- title -->
  <text x="490" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Office Status Light — wiring rev 4 (battery-capable)</text>
  <text x="490" y="56" text-anchor="middle" font-size="13" fill="#666666">XIAO ESP32-C6 · Zigbee 3.0 (ZHA) · diode-OR ring supply: USB when present, LiPo during outages</text>

  <!-- ===== USB supply ===== -->
  <rect x="35" y="100" width="120" height="66" rx="8" fill="#e8e8e8" stroke="#888888" stroke-width="1.5"/>
  <text x="95" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">USB 5 V</text>
  <text x="95" y="144" text-anchor="middle" font-size="10" fill="#555555">PC or wall wart</text>
  <line x1="155" y1="133" x2="205" y2="133" stroke="#888888" stroke-width="4"/>
  <polyline points="205,133 205,190 246,190" fill="none" stroke="#888888" stroke-width="4"/>
  <text x="200" y="121" text-anchor="middle" font-size="10" fill="#777777">USB-C</text>

  <!-- ===== LiPo battery ===== -->
  <rect x="35" y="420" width="120" height="90" rx="8" fill="#e8e8e8" stroke="#888888" stroke-width="1.5"/>
  <rect x="155" y="432" width="8" height="14" fill="#888888"/>
  <text x="95" y="452" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">1S LiPo 3.7 V</text>
  <text x="95" y="468" text-anchor="middle" font-size="11" fill="#555555">8000 mAh</text>
  <text x="95" y="484" text-anchor="middle" font-size="9" fill="#777777">protected cell</text>
  <text x="95" y="527" text-anchor="middle" font-size="9" font-weight="bold" fill="#b25250">METER IT FIRST — never verified</text>

  <!-- LiPo+ to BAT+ -->
  <polyline points="163,440 185,440 185,392 268,392 268,372" fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <text x="192" y="386" font-size="10" font-weight="bold" fill="#c0392b">LiPo +</text>
  <!-- LiPo- to BAT- -->
  <polyline points="155,495 330,495 330,372" fill="none" stroke="#3d3d3d" stroke-width="2.5"/>
  <text x="255" y="509" font-size="10" font-weight="bold" fill="#3d3d3d">LiPo −</text>

  <!-- ===== XIAO ESP32-C6 ===== -->
  <rect x="250" y="130" width="180" height="230" rx="12" fill="#2b3440" stroke="#111827" stroke-width="1.5"/>
  <rect x="246" y="176" width="14" height="30" rx="3" fill="#b8bec6" stroke="#6b7280"/>
  <rect x="305" y="140" width="70" height="24" rx="4" fill="#3d4a5c"/>
  <text x="340" y="157" text-anchor="middle" font-size="9" fill="#9aa7b8">radio/ant</text>
  <text x="340" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">XIAO</text>
  <text x="340" y="253" text-anchor="middle" font-size="13" fill="#d7dde6">ESP32-C6</text>
  <text x="340" y="273" text-anchor="middle" font-size="9" fill="#9aa7b8">charger ~100 mA</text>

  <!-- pins right edge: 5V, D1, D2, GND -->
  <rect x="428" y="178" width="12" height="10" fill="#d4af37"/>
  <text x="422" y="187" text-anchor="end" font-size="11" font-weight="bold" fill="#f0d9a0">5V</text>
  <rect x="428" y="238" width="12" height="10" fill="#d4af37"/>
  <text x="422" y="247" text-anchor="end" font-size="11" font-weight="bold" fill="#f0d9a0">D1</text>
  <rect x="428" y="288" width="12" height="10" fill="#d4af37"/>
  <text x="422" y="297" text-anchor="end" font-size="11" font-weight="bold" fill="#f0d9a0">D2</text>
  <rect x="428" y="330" width="12" height="10" fill="#d4af37"/>
  <text x="422" y="339" text-anchor="end" font-size="11" font-weight="bold" fill="#f0d9a0">GND</text>

  <!-- BAT pads bottom edge (underside) -->
  <rect x="262" y="362" width="12" height="10" fill="#d4af37"/>
  <rect x="324" y="362" width="12" height="10" fill="#d4af37"/>
  <text x="248" y="386" text-anchor="middle" font-size="10" font-weight="bold" fill="#8a7020">BAT+</text>
  <text x="352" y="386" text-anchor="middle" font-size="10" font-weight="bold" fill="#8a7020">BAT−</text>

  <!-- ===== diode-OR ===== -->
  <!-- 5V pin to D_usb -->
  <polyline points="440,183 520,183" fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <polygon points="520,173 520,193 545,183" fill="#c0392b"/>
  <line x1="545" y1="171" x2="545" y2="195" stroke="#c0392b" stroke-width="3"/>
  <text x="532" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">D_usb</text>
  <text x="532" y="211" text-anchor="middle" font-size="9" fill="#777777">SS34 / 1N5822</text>
  <line x1="545" y1="183" x2="600" y2="183" stroke="#c0392b" stroke-width="2.5"/>

  <!-- BAT+ tap up to D_bat -->
  <polyline points="268,392 268,412 480,412 480,262 520,262" fill="none" stroke="#e67e22" stroke-width="2.5"/>
  <polygon points="520,252 520,272 545,262" fill="#e67e22"/>
  <line x1="545" y1="250" x2="545" y2="274" stroke="#e67e22" stroke-width="3"/>
  <text x="513" y="258" text-anchor="end" font-size="10" font-weight="bold" fill="#e67e22">D_bat</text>
  <text x="570" y="290" text-anchor="middle" font-size="9" fill="#777777">SS34 / 1N5822</text>
  <polyline points="545,262 600,262 600,183" fill="none" stroke="#e67e22" stroke-width="2.5"/>

  <!-- VLED node -->
  <circle cx="600" cy="183" r="5" fill="#1a1a1a"/>
  <text x="600" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a1a">VLED</text>
  <polyline points="600,183 700,183 700,205" fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <text x="668" y="176" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">→ ring VCC</text>

  <!-- data line D1 -> 330R -> DIN -->
  <polyline points="440,243 620,243" fill="none" stroke="#2e86c1" stroke-width="2.5"/>
  <rect x="620" y="236" width="44" height="14" rx="3" fill="#ffffff" stroke="#2e86c1" stroke-width="2"/>
  <text x="642" y="247" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e86c1">330 Ω</text>
  <polyline points="664,243 745,243 745,258" fill="none" stroke="#2e86c1" stroke-width="2.5"/>
  <text x="700" y="234" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e86c1">DIN</text>

  <!-- ===== WS2812B ring ===== -->
  <circle cx="790" cy="330" r="100" fill="none" stroke="#444444" stroke-width="26"/>
  <circle cx="790" cy="330" r="100" fill="none" stroke="#5cb85c" stroke-width="18" stroke-dasharray="10 16"/>
  <text x="790" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">WS2812B</text>
  <text x="790" y="343" text-anchor="middle" font-size="12" fill="#444444">24-LED ring</text>
  <!-- ring pads -->
  <text x="708" y="214" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">VCC</text>
  <text x="760" y="272" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e86c1">DIN</text>
  <text x="726" y="428" text-anchor="middle" font-size="10" font-weight="bold" fill="#3d3d3d">GND</text>

  <!-- 1000uF cap across ring rails -->
  <line x1="905" y1="255" x2="905" y2="278" stroke="#555555" stroke-width="2.5"/>
  <line x1="893" y1="278" x2="917" y2="278" stroke="#555555" stroke-width="3"/>
  <line x1="893" y1="286" x2="917" y2="286" stroke="#555555" stroke-width="3"/>
  <line x1="905" y1="286" x2="905" y2="310" stroke="#555555" stroke-width="2.5"/>
  <polyline points="700,205 905,205 905,255" fill="none" stroke="#c0392b" stroke-width="2"/>
  <polyline points="905,310 905,440 790,440 790,430" fill="none" stroke="#3d3d3d" stroke-width="2"/>
  <text x="944" y="276" text-anchor="middle" font-size="9" font-weight="bold" fill="#555555">1000 µF</text>
  <text x="944" y="288" text-anchor="middle" font-size="9" fill="#777777">6.3 V, at ring</text>

  <!-- ===== AO3400 low-side FET ===== -->
  <rect x="600" y="470" width="150" height="86" rx="8" fill="#f4ecd8" stroke="#a08a3c" stroke-width="1.5"/>
  <text x="675" y="492" text-anchor="middle" font-size="12" font-weight="bold" fill="#6b5a1e">AO3400</text>
  <text x="675" y="507" text-anchor="middle" font-size="9" fill="#8a7a40">N-FET (SOT-23), low-side</text>
  <text x="614" y="527" font-size="10" font-weight="bold" fill="#6b5a1e">D</text>
  <text x="738" y="527" text-anchor="end" font-size="10" font-weight="bold" fill="#6b5a1e">S</text>
  <text x="675" y="548" text-anchor="middle" font-size="10" font-weight="bold" fill="#6b5a1e">G</text>
  <!-- ring GND -> drain -->
  <polyline points="742,432 742,455 590,455 590,523 610,523" fill="none" stroke="#3d3d3d" stroke-width="2.5"/>
  <text x="668" y="450" text-anchor="middle" font-size="9" fill="#555555">ring GND return</text>
  <!-- source -> GND -->
  <polyline points="742,523 770,523 770,600 470,600 470,335 440,335" fill="none" stroke="#3d3d3d" stroke-width="2.5"/>
  <text x="620" y="614" text-anchor="middle" font-size="10" font-weight="bold" fill="#3d3d3d">GND</text>
  <!-- gate from D2 -->
  <polyline points="440,293 505,293 505,585 675,585 675,556" fill="none" stroke="#8e44ad" stroke-width="2.5"/>
  <text x="540" y="578" font-size="10" font-weight="bold" fill="#8e44ad">D2 / GPIO2 (gate)</text>
  <!-- 100k pulldown gate->GND -->
  <rect x="700" y="565" width="40" height="13" rx="3" fill="#ffffff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="720" y="575" text-anchor="middle" font-size="8" font-weight="bold" fill="#8e44ad">100 k</text>
  <polyline points="675,571 700,571" fill="none" stroke="#8e44ad" stroke-width="2"/>
  <polyline points="740,571 770,571" fill="none" stroke="#8e44ad" stroke-width="2"/>

  <!-- ===== how it behaves ===== -->
  <rect x="35" y="640" width="560" height="118" rx="8" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <text x="50" y="663" font-size="11" font-weight="bold" fill="#333333">How the diode-OR behaves</text>
  <text x="50" y="683" font-size="10" fill="#444444">• USB present: ring runs from USB (~4.65 V after D_usb) — charger's full ~100 mA goes to the cell</text>
  <text x="50" y="700" font-size="10" fill="#444444">• USB out: ring runs from LiPo (~3.0–3.9 V after D_bat) — a bit dimmer, dims as the cell drains</text>
  <text x="50" y="717" font-size="10" fill="#444444">• Ring lit 24/7 on battery ≈ 2–2.5 days; dark-when-OK policy (phase 2) ≈ 10–13 days</text>
  <text x="50" y="734" font-size="10" fill="#444444">• AO3400 opens the ring's ground when the light is off → dark ring = 0 mA (WS2812B idles ~1 mA/LED)</text>
  <text x="50" y="751" font-size="10" fill="#444444">• MCU + Zigbee always battery-backed via the BAT pads (that part is native to the XIAO)</text>

  <!-- ===== phase 2 (optional) ===== -->
  <rect x="615" y="640" width="330" height="118" rx="8" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="630" y="663" font-size="11" font-weight="bold" fill="#555555">Phase 2 (optional, later)</text>
  <text x="630" y="683" font-size="10" fill="#555555">• USB detect: 5V →100k→ D3 (GPIO21) →100k→ GND</text>
  <text x="630" y="700" font-size="10" fill="#555555">• Batt volts: BAT+ →200k→ A0 (GPIO0) →100k→ GND</text>
  <text x="630" y="717" font-size="10" fill="#555555">   (200 k = 2 × 100 k in series — none in stock)</text>
  <text x="630" y="734" font-size="10" fill="#555555">• Enables dark-when-OK on battery + battery % in HA</text>
  <text x="630" y="751" font-size="10" fill="#555555">• Needs firmware + ZHA re-pair; not blocking rev 4</text>
</svg>
