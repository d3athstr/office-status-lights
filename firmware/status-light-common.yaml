# Shared package for the office status lights — ZIGBEE end device, one
# color-controllable endpoint for the whole ring. Per-device files set:
# name, friendly_name, data_pin, gate_pin.
#
# Behavior (rev 3): HA drives the whole ring as a single color light —
# green = all OK, red = problem, scheduled 08:00-15:00 Mon-Fri, dark
# otherwise (Don's spec 2026-07-16; conscious exception to the ISA-101
# dark-when-OK rule, bounded by the schedule). Colors/schedule live in HA
# automations, not here.
#
# Radio: Zigbee 3.0 via luar123/zigbee_esphome (pinned), pairs with ZHA.
# No wifi/api/ota — reflash over USB-C only.
# DO NOT attach a serial monitor while testing Zigbee: opening the C6's
# USB-Serial/JTAG port hard-resets the chip (rst:0x15) and drops it off
# the network.
#
# Power: 1S LiPo on the XIAO BAT pads keeps the MCU+radio alive; the ring
# only lights while a 5 V/BAT+ source feeds its VCC (see docs/wiring.md
# for the as-built USB variant vs the battery-native rewire). gate_pin
# drives an optional AO3400 low-side FET on the ring's GND return so a
# dark ring draws 0 mA — harmless if the FET isn't fitted.

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  # XIAO ESP32-C6 RF switch: GPIO3 low powers the antenna switch, GPIO14 low
  # selects the built-in ceramic antenna (high = external u.FL). Neither pin
  # is on the header. Without this the 802.15.4 radio hears nothing.
  on_boot:
    priority: 800
    then:
      - output.turn_off: rf_switch_enable
      - output.turn_off: rf_antenna_select

output:
  - platform: gpio
    id: rf_switch_enable
    pin: GPIO3
  - platform: gpio
    id: rf_antenna_select
    pin: GPIO14

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source: github://luar123/zigbee_esphome@c18c9a28f8b116db0c8a7d3dc9be114b03f0f3cd
    components: [zigbee]

logger:
  level: INFO

globals:
  - id: color_x
    type: float
    restore_value: no
    initial_value: '0'
  - id: color_y
    type: float
    restore_value: no
    initial_value: '0'

zigbee:
  id: zb
  endpoints:
    - num: 1
      device_type: COLOR_DIMMABLE_LIGHT
      clusters:
        - id: ON_OFF
          attributes:
            - attribute_id: 0
              type: bool
              on_value:
                then:
                  - light.control:
                      id: ring
                      state: !lambda "return (bool)x;"
        - id: LEVEL
          attributes:
            - attribute_id: 0
              type: UINT8
              value: 255
              on_value:
                then:
                  - light.control:
                      id: ring
                      brightness: !lambda "return ((float)x)/255;"
        - id: COLOR_CONTROL
          attributes:
            - attribute_id: 3
              type: UINT16
              on_value:
                then:
                  - lambda: id(color_x) = (float)x/65536;
                  - light.control:
                      id: ring
                      red: !lambda "return zigbee::get_r_from_xy(id(color_x), id(color_y));"
                      green: !lambda "return zigbee::get_g_from_xy(id(color_x), id(color_y));"
                      blue: !lambda "return zigbee::get_b_from_xy(id(color_x), id(color_y));"
            - attribute_id: 4
              type: UINT16
              on_value:
                then:
                  - lambda: id(color_y) = (float)x/65536;
                  - light.control:
                      id: ring
                      red: !lambda "return zigbee::get_r_from_xy(id(color_x), id(color_y));"
                      green: !lambda "return zigbee::get_g_from_xy(id(color_x), id(color_y));"
                      blue: !lambda "return zigbee::get_b_from_xy(id(color_x), id(color_y));"
  on_join:
    then:
      - logger.log: "Joined Zigbee network"

# Optional AO3400 on the ring GND return — follows the ring's on/off state.
# No-op if the FET isn't fitted (rev 1 as-built wiring).
switch:
  - platform: gpio
    id: ring_gate
    pin: ${gate_pin}
    restore_mode: ALWAYS_OFF
    internal: true

light:
  - platform: esp32_rmt_led_strip
    id: ring
    internal: true
    pin: ${data_pin}
    num_leds: 24
    chipset: ws2812
    rgb_order: GRB
    rmt_symbols: 48
    default_transition_length: 250ms
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - switch.turn_on: ring_gate
    on_turn_off:
      - switch.turn_off: ring_gate

# XIAO BOOT button (GPIO9): hold 5-20 s to factory-reset the Zigbee join.
binary_sensor:
  - platform: gpio
    id: boot_button
    internal: true
    pin:
      number: GPIO9
      mode:
        input: true
        pullup: true
      inverted: true
    on_click:
      min_length: 5s
      max_length: 20s
      then:
        - zigbee.reset: zb

