# Shared package for the office status lights — ZIGBEE end device, battery powered.
# Per-device files set: name, friendly_name, data_pin, gate_pin.
#
# Radio: Zigbee 3.0 via the experimental luar123/zigbee_esphome component
# (same as the pool level monitor plan). Pairs with ZHA. No wifi/api/ota —
# reflash over USB-C only.
#
# Power: 1S LiPo on the XIAO BAT pads. The ring's VCC comes from BAT+ (the
# XIAO 5V pin is dead on battery) and its GND return is switched by an AO3400
# low-side FET (gate = gate_pin, 100k pulldown) so a dark ring draws zero —
# WS2812Bs idle at ~1 mA/LED even when off, which would otherwise dominate
# the battery budget. ISA-101: dark = OK = gated off.
#
# HA exposes four fixed-hue dimmable lights (one per quadrant); automations
# just turn them on/off. Hues are set here, not in HA.

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source: github://luar123/zigbee_esphome@c18c9a28f8b116db0c8a7d3dc9be114b03f0f3cd
    components: [zigbee]

logger:
  level: INFO

zigbee:
  id: zb
  endpoints:
    - num: 1                       # WAN / internet — red
      device_type: DIMMABLE_LIGHT
      clusters:
        - id: ON_OFF
          attributes:
            - attribute_id: 0
              type: bool
              on_value:
                then:
                  - light.control:
                      id: seg_wan
                      state: !lambda "return (bool)x;"
                      red: 100%
                      green: 0%
                      blue: 0%
                  - script.execute: update_gate
        - id: LEVEL
          attributes:
            - attribute_id: 0
              type: UINT8
              value: 255
              on_value:
                then:
                  - light.control:
                      id: seg_wan
                      brightness: !lambda "return ((float)x)/255;"
    - num: 2                       # VPN — amber
      device_type: DIMMABLE_LIGHT
      clusters:
        - id: ON_OFF
          attributes:
            - attribute_id: 0
              type: bool
              on_value:
                then:
                  - light.control:
                      id: seg_vpn
                      state: !lambda "return (bool)x;"
                      red: 100%
                      green: 55%
                      blue: 0%
                  - script.execute: update_gate
        - id: LEVEL
          attributes:
            - attribute_id: 0
              type: UINT8
              value: 255
              on_value:
                then:
                  - light.control:
                      id: seg_vpn
                      brightness: !lambda "return ((float)x)/255;"
    - num: 3                       # Backup freshness — amber
      device_type: DIMMABLE_LIGHT
      clusters:
        - id: ON_OFF
          attributes:
            - attribute_id: 0
              type: bool
              on_value:
                then:
                  - light.control:
                      id: seg_backup
                      state: !lambda "return (bool)x;"
                      red: 100%
                      green: 55%
                      blue: 0%
                  - script.execute: update_gate
        - id: LEVEL
          attributes:
            - attribute_id: 0
              type: UINT8
              value: 255
              on_value:
                then:
                  - light.control:
                      id: seg_backup
                      brightness: !lambda "return ((float)x)/255;"
    - num: 4                       # Unacked alerts — magenta
      device_type: DIMMABLE_LIGHT
      clusters:
        - id: ON_OFF
          attributes:
            - attribute_id: 0
              type: bool
              on_value:
                then:
                  - light.control:
                      id: seg_alert
                      state: !lambda "return (bool)x;"
                      red: 100%
                      green: 0%
                      blue: 100%
                  - script.execute: update_gate
        - id: LEVEL
          attributes:
            - attribute_id: 0
              type: UINT8
              value: 255
              on_value:
                then:
                  - light.control:
                      id: seg_alert
                      brightness: !lambda "return ((float)x)/255;"
  on_join:
    then:
      - logger.log: "Joined Zigbee network"

# Ring GND return through the AO3400 — off = ring physically dark, 0 mA.
switch:
  - platform: gpio
    id: ring_gate
    pin: ${gate_pin}
    restore_mode: ALWAYS_OFF
    internal: true

script:
  - id: update_gate
    then:
      - lambda: |-
          bool any = id(seg_wan).remote_values.is_on()
                  || id(seg_vpn).remote_values.is_on()
                  || id(seg_backup).remote_values.is_on()
                  || id(seg_alert).remote_values.is_on();
          if (any) id(ring_gate).turn_on(); else id(ring_gate).turn_off();

light:
  - platform: esp32_rmt_led_strip
    id: ring
    internal: true
    pin: ${data_pin}
    num_leds: 24
    chipset: ws2812
    rgb_order: GRB
    rmt_symbols: 48
    default_transition_length: 250ms
    restore_mode: ALWAYS_OFF

  # Quadrants, clockwise from LED 0. Driven only by the zigbee handlers above.
  - platform: partition
    id: seg_wan
    internal: true
    restore_mode: ALWAYS_OFF
    segments: [{id: ring, from: 0, to: 5}]
  - platform: partition
    id: seg_vpn
    internal: true
    restore_mode: ALWAYS_OFF
    segments: [{id: ring, from: 6, to: 11}]
  - platform: partition
    id: seg_backup
    internal: true
    restore_mode: ALWAYS_OFF
    segments: [{id: ring, from: 12, to: 17}]
  - platform: partition
    id: seg_alert
    internal: true
    restore_mode: ALWAYS_OFF
    segments: [{id: ring, from: 18, to: 23}]

# XIAO BOOT button (GPIO9): hold 5-20 s to factory-reset the Zigbee join.
binary_sensor:
  - platform: gpio
    id: boot_button
    internal: true
    pin:
      number: GPIO9
      mode:
        input: true
        pullup: true
      inverted: true
    on_click:
      min_length: 5s
      max_length: 20s
      then:
        - zigbee.reset: zb

